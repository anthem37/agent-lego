server:
  port: 8080

spring:
  application:
    name: agent-lego-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/agentlego}
    username: ${DB_USER:agentlego}
    password: ${DB_PASSWORD:agentlego}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO

# 本服务作为 MCP Server 对外暴露（SSE）；工具列表与进程内 LOCAL 内置一致
agentlego:
  mcp:
    server:
      enabled: true
      sse-path: /mcp
mybatis:
  mapper-locations: classpath*:mybatis/*.xml
  configuration:
    map-underscore-to-camel-case: true

