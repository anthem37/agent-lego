server:
  port: 8080

spring:
  application:
    name: agent-lego-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/agentlego}
    username: ${DB_USER:agentlego}
    password: ${DB_PASSWORD:agentlego}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO

# 本服务作为 MCP Server 对外暴露（SSE）；工具列表与进程内 LOCAL 内置一致
agentlego:
  mcp:
    server:
      enabled: true
      sse-path: /mcp
    # 作为 Client 连外部 MCP：发现/批量导入前的 URL 校验
    client:
      # true 时与 HTTP 工具相同，禁止回环与解析到内网的 host（本地 127.0.0.1 联调需 false）
      strict-ssrf: false
  # HTTP 工具 test-call / 执行超时（秒），后端限制在 5–600
  tool:
    http-call-timeout-seconds: 120

mybatis:
  mapper-locations: classpath*:mybatis/*.xml
  configuration:
    map-underscore-to-camel-case: true

# 模型连通性测试（聊天：流式采集 chunk 上限与默认 maxTokens）
model:
  connectivity:
    testPrompt: "Reply with a single word: OK."
    maxTokens: 256
    maxStreamChunks: 32
    timeout: PT2M

